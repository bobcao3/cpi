# All textual content for the llm_editor tool and its tool-less subagents.
# Layered, last-wins (project > user > shipped default), matching cpi's config
# convention:
#   extensions/llm-editor/text.toml             (shipped defaults)
#   ~/.pi/agent/cpi-editor-text.toml            (user, all projects)
#   <cwd>/.pi/cpi-editor-text.toml              (project, overrides user)
#
# Format is TOML, parsed by `smol-toml` (0 deps, BSD-3). Multi-line literal
# strings ('''...''') preserve the exact text the model sees (no escape
# processing, so `\t` stays literal); basic strings ("...") interpret \n. A
# newline right after the opening ''' is trimmed, so content starts on the next
# line. Templates use {{placeholder}} tokens substituted at runtime.

# ── System prompts for the Viewer/Editor subagents (near-verbatim SWE-Edit) ──
[system]
viewer = '''
You are an expert code analyzer. Your task is to identify line ranges in a file that are relevant to a given query.

You will be given:
1. A file with numbered lines in the format: LINE_NUMBER\tLINE_CONTENT
2. A query describing what the user is looking for

Consider function/method definitions, class definitions, variable declarations, imports, comments, and any code blocks that implement functionality related to the query.

OUTPUT FORMAT: output ONLY a JSON array of line ranges. Each range is [start_line, end_line] (inclusive, 1-indexed). No explanation, no markdown fences.

Example: [[10, 25], [45, 60], [100, 115]]

RULES:
1. Only output the JSON array, nothing else.
2. Line numbers are 1-indexed.
3. Each range must include complete logical blocks (do not split functions/classes).
4. Include a few lines of context before and after each relevant section.
5. If nothing is relevant, return [].
6. Sort ranges by start line; merge overlapping or adjacent ranges.
7. Do not include entire files unless the query asks for everything.

Example 1 - Finding a specific function:
Query: "Where is the calculate_total function defined?"
Output: [[15, 28]]

Example 2 - Finding multiple related sections:
Query: "How is user authentication handled?"
Output: [[5, 8], [23, 45], [102, 130]]

Example 3 - Nothing relevant found:
Query: "Where is the database connection configured?"
Output: []
'''
editor = '''
You are an expert code editor. Your task is to analyze a file and make modifications according to the provided instructions.

Output your changes using the search-replace format. You can make multiple edits by including multiple search-replace blocks.

Format for each edit:
<<<<<<< SEARCH
exact lines from the original file to find
=======
new lines to replace them with
>>>>>>> REPLACE

IMPORTANT RULES:
1. The SEARCH block must match the original file content EXACTLY, including whitespace and indentation.
2. You can make multiple edits by including multiple search-replace blocks.
3. If the SEARCH block is empty (no content between <<<<<<< SEARCH and =======), it means REWRITE THE ENTIRE FILE with the content in the REPLACE block.
4. Each SEARCH block must be unique in the file; if there are multiple matches, include more surrounding context.
5. Output ONLY the search-replace blocks. No explanation, no markdown fences, no commentary.
6. After outputting all search-replace blocks, call the `edit-complete` tool with `action="apply"` to apply the edit, or `action="cancel"` to abort without applying. You MUST call edit-complete to signal completion — the edit is not applied until you do, and not calling it is treated as an incomplete/truncated edit.

Example 1 - Modifying specific lines:
<<<<<<< SEARCH
def calculate_total(items):
    return sum(items)
=======
def calculate_total(items):
    if not items:
        return 0
    return sum(items)
>>>>>>> REPLACE

Example 2 - Multiple edits:
<<<<<<< SEARCH
import os
=======
import os
import sys
>>>>>>> REPLACE
<<<<<<< SEARCH
def main():
    pass
=======
def main():
    print("Hello, World!")
>>>>>>> REPLACE

Example 3 - Rewriting entire file (empty SEARCH block):
<<<<<<< SEARCH
=======
#!/usr/bin/env python3
# New file content here
def new_function():
    pass
>>>>>>> REPLACE
'''
editor_fuzzy = '''
ADDITIONAL CAPABILITIES (fuzzy matching is enabled for this edit):

You MAY use ellipsis (`...`) on its own line inside a SEARCH block to elide unchanged code that sits BETWEEN two regions you are editing within the same block. This lets you skip restating long unchanged spans. Rules:
- Put `...` alone on a line (optional leading whitespace) where code was omitted.
- The number of `...` lines MUST match between SEARCH and REPLACE.
- Each non-`...` chunk must appear EXACTLY ONCE in the file.
- `...` means "leave this region unchanged"; it is not a wildcard — the surrounding chunks must still match the file exactly.

Example — edit the first and last lines of a long function, omitting the unchanged middle:
<<<<<<< SEARCH
def f(x):
    a = setup(x)
...
    return result
=======
def f(x):
    a = setup(x, verbose=True)
...
    return result
>>>>>>> REPLACE

Additionally, matching tolerates a UNIFORM leading-whitespace offset between SEARCH and the file (you may omit indentation that is consistent across the whole block); REPLACE is re-indented to the file's level. Prefer exact matches; use these only when an exact SEARCH would be impractical.
'''

# ── User-message task templates fed to the subagents on stdin ({{placeholder}}) ──
[tasks]
viewer = "Here is the file with numbered lines:\n\n{{content}}\n\nQuery: {{query}}"
editor = "Here is the current file content:\n```\n{{content}}\n```\n\nInstruction: {{instruction}}\n\nPlease provide the search-replace blocks needed to make these changes."
editor_reconcile = "A concurrent edit changed the file on disk since your previous attempt, so those blocks were not applied. Here is the CURRENT file content:\n```\n{{content}}\n```\n\nInstruction: {{instruction}}\n\nRe-apply the instruction against this current content. Output ONLY the search-replace blocks."

# ── Tool metadata shown to the main agent ──
[tool]
label = "LLM editor"
description = "View, create, and edit files. view on a directory lists it; view on a file with a query returns only the relevant ranges (AI-filtered); create writes a new file; edit applies a natural-language instruction via a subagent that emits exact search-replace blocks. Prefer this over sh for reading and editing files."
prompt_snippet = "View/create/edit files (AI-mediated)"
guidelines = [
	"Use llm_editor for file reads and edits in preference to sh; use sh for git, build, test, search, and process control.",
	"Set the `query` argument for llm_editor:view, describing what you are looking for; it returns only the relevant ranges with line numbers (AI-filtered), not the whole file, which saves context and reduces noise.",
	"llm_editor edit takes a natural-language `instruction` naming the function/class/method to change; the subagent produces exact search-replace blocks. Be specific: 'In MyClass.my_method, change X to Y' beats 'fix the bug'.",
	"If your edit instruction requires synthesizing novel logic the editor cannot derive deterministically from the file, do NOT use `edit`. Use `create` (you author file_text) or decompose into discrete deterministic edits.",
	"llm_editor create fails if the path already exists; use llm_editor edit to modify existing files.",
]

# ── Schema field descriptions (injected into the TypeBox tool schema) ──
[schema]
command = "view | create | edit"
path = "Absolute path to a file or directory."
query = "view on a file: natural-language query for what to find; an LLM returns only the relevant line ranges with line numbers."
instruction = "edit: natural-language change description; name the function/class/method to change."
file_text = "create: full content of the new file."

# ── Short result/inline message strings ──
[messages]
view_no_ranges = "(no relevant ranges)"
empty_dir = "(empty)"
no_output = "(no output)"
head_more = "... ({{n}} more lines; pass a query to view relevant ranges)"
lines_omitted = "... ({{n}} lines omitted) ..."
over_think_warn = "Editor over-thought ({{thinking}} tokens > budget {{budget}}); the edit was applied, but the instruction likely required synthesis the editor produced only by straining. Audit the applied diff before relying on it. For similar future edits, prefer llm_editor create (author file_text) or decompose into discrete deterministic edits."

# ── LSP result-field strings (design §9; {{placeholder}} substituted via fmt) ──
[lsp]
diagnostics_none = "none"
install_failed = "run 'lsp start file={{path}}' to provision"
restart_hint = "LSP auto-started for {{root}}. If the env is wrong, run 'lsp start file={{path}} env=<dotenv>' to restart."

# ── Error message templates ({{placeholder}} substituted at runtime) ──
[errors]
aborted = "Aborted before start."
not_found = "Not found: {{path}}"
not_a_file = "Not a file: {{path}}"
file_too_large = "File is {{size}} bytes (limit {{limit}}); too large for llm_editor to load ({{path}}). Use sh to inspect regions (`rg` to locate, `sed -n 'M,Np'` to read a range); llm_editor cannot load this file."
cannot_read = "Cannot read {{path}}: {{reason}}"
create_requires_text = "create requires file_text."
file_exists = "File already exists: {{path}}. Use llm_editor edit to modify it."
create_failed = "Create failed: {{reason}}"
edit_requires_instruction = "edit requires an instruction."
no_editor_model = "llm_editor: no editor model (no editor config and no main model)."
invalid_chain_regex = '[llm-editor] chain rule {{i}}: invalid regex "{{pattern}}"; skipping.'
configured_unavailable = '[llm-editor] configured editor.model "{{model}}" not available/authed; falling back to chain.'
viewer_timeout = "Viewer subagent timed out after {{ms}}ms. Consider fewer query statements & use concrete keywords."
editor_timeout = "Editor subagent timed out after {{ms}}ms. Consider reducing scope & increase specificity"
editor_over_think = "Editor subagent aborted: thinking ({{thinking}} tokens) exceeded budget {{budget}}. The instruction likely requires synthesis the editor cannot derive from the file. Use llm_editor create (author file_text) or decompose into discrete deterministic edits."
editor_cancelled = "Editor subagent cancelled the edit (edit-complete action=cancel)."
editor_truncated = "Editor subagent did not signal completion (edit-complete not called — output was truncated/incomplete). Re-run the edit."
viewer_bad_output = "Viewer did not return a JSON line-range array.\nOutput: {{tail}}"
write_failed = "Write failed: {{reason}}"
file_drifted = "File changed on disk mid-edit (concurrent edit); not patched even after one automatic reconcile. Re-read {{path}} and apply the change again."
spawn_not_found = "pi binary not found on PATH: {{reason}}"
apply_no_blocks = "No search-replace blocks found in editor output."
apply_not_found = "Block {{i}}: SEARCH text not found in file. It must match exactly (whitespace/indentation)."
apply_not_found_fuzzy = "Block {{i}}: SEARCH text not found in file. Both exact match and fuzzy fallback (uniform-indent tolerance + ... elision) failed."
apply_not_unique = "Block {{i}}: SEARCH text is not unique ({{n}} matches). Add more surrounding context."
apply_empty_with_others = "Empty SEARCH (whole-file rewrite) cannot coexist with other blocks."
apply_overlap = "Block {{i}} overlaps block {{j}}. Merge or separate them."

# ── Transcript (persisted subagent log) labels ──
[transcript]
title = "# llm_editor {{role}} subagent"
section_system = "## System Prompt"
section_user = "## User"
section_assistant = "## Assistant"
section_stderr = "## stderr"

# ── Injected into the main system prompt by the cpi system-prompt transform (idempotent; wrapped in markers by index.ts) ──
[system_prompt]
transcript_block = '''
Each llm_editor result includes an `<id>` = short-sha of its args (command, path, query/instruction/file_text).
For `view` with a query and `edit`, the subagent transcript is persisted at {{dir}}/<id>.md.
'''
