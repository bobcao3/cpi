# Model-facing text for the set_cwd tool. Layered (project > user > shipped).

[tool]
description = "Change the cwd for all subsequent tool calls or shell commands."
prompt_snippet = "Change the cwd for all subsequent tool calls or shell commands."

[schema]
path = "Target directory, absolute, or relative to cwd"

[guidelines]
bullets = [
  "Use set_cwd when the user switches projects, or when the current CWD is no longer the right root for shell commands.",
  "Use set_cwd to avoid repeatedly prefixing `cd path/to/project && ...` on every sh call.",
]
