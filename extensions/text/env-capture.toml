# Model-facing text for the sh_env_capture tool. Layered (project > user > shipped).

[tool]
description = "Capture the current process environment (optionally after running a bash command such as sourcing a venv) into a session-scoped dotenv file, reloadable via `env=<path>` on sh / sh_repeat_until / lsp."
prompt_snippet = "Capture env into a dotenv file"

[schema]
command = "Optional bash to run before capturing (e.g. 'source .venv/bin/activate'). Omit = capture current process env."
label = "Optional name for the dotenv file"

[guidelines]
bullets = '''
Use sh_env_capture to snapshot env (e.g. after `source .venv/bin/activate`) into a file, then reload it via `env=<path>` on sh or sh_repeat_until.
The returned `env=<path>` snippet is reusable across later commands; the file path is absolute and session-scoped.
Reload the same captured file via `env=<path>` on sh / sh_repeat_until / `lsp start`.'''
