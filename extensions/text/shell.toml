# Model-facing text for the shell extension (sh, sh_signal, sh_background_ps,
# sh_repeat_until guidelines live in shell/repeat.toml).
#
# Layered, last-wins (project > user > shipped default), matching cpi's config
# convention:
#   extensions/shell/text.toml              (shipped defaults)
#   ~/.pi/agent/shell.toml                  (user, all projects)
#   <cwd>/.pi/shell.toml                    (project, overrides user)
#
# Templates use the mustache subset from lib/text.ts:
#   {{name}}            interpolate (unescaped)
#   {{#name}}...{{/}}   render when truthy; loops over arrays
#   {{^name}}...{{/}}   render when falsy
#   {{!comment}}        dropped
# Conditionals here are driven by global switches resolved at tool registration:
#   fd / rg / shuck / tree_sitter  (binary availability, process-stable)
#   max_waitfor / max_preview_lines  (tunables from cpi-config.json)
# Vision-gated content belongs in system-prompt transforms (per-turn, ctx.model),
# not in these static tool fields.

# ── Tool metadata shown to the main agent ──
[sh]
description = "Run a command via `bash -c`. Stateless: no env/cwd persistence. If the command runs longer than `waitfor`, sh backgrounds it and returns an id for signalling. Maximum waitfor is {{max_waitfor}}s."
prompt_snippet = "Run shell commands"

[sh_signal]
description = "Signal a background shell command by its PID (sh-returned). Send SIGKILL to terminate background shell process-group."
prompt_snippet = "Signal background shell commands"

[sh_background_ps]
description = "List active background shells and repeat_until monitors."
prompt_snippet = "List active background jobs"

[schema.sh]
description = "Short description of what this command is doing (a few words)"
waitfor = "Seconds to wait before backgrounding (default {{max_waitfor}}, max {{max_waitfor}}; >{{max_waitfor}} errors)"
command = "Command to run"
env = "Dotenv merged into sh env; dotenv wins"

[schema.sh_signal]
id = "Background shell PID (as returned by sh)"
signal = "Signal name/number (default SIGINT; SIGKILL to terminate)"

# ── promptGuidelines ──
[guidelines]
sh = [
  "Each sh call = fresh `bash -c`. No session reuse; env/cwd/shell state don't persist. Use `env-capture` to capture the current environment as a dotenv file that you can load in later `sh` sessions.",
  "For sh & sh_repeat_until, a short `description` parameter is required (a few words explaining the command's purpose).",
  "For sh tool, the maximum legal `waitfor` time is {{max_waitfor}}s; any longer the command will be rejected.",
  "Signal a background shell via sh_signal with its PID; send SIGKILL to terminate.",
  "A completion notification will fire once a background shell finishes and returns control to agent.",
  "Avoid polling or busy waiting: do not set up repeated `alarm`s to poll a backgrounded shell (a completion notification fires on its own), and try to avoid writing `sleep N && ...` commands; use the `alarm` tool instead for scheduled wake-ups.",
  "If a background shell completes and no follow-up is needed, feel free to end the turn.",
  "{{#fd}}Search files with the faster `$ fd` command not `$ find`: fd [OPTS] [-H] [-I] [pattern] [path]...{{/fd}}",
  "{{#rg}}Search content with the faster `$ rg` command not `$ grep`: rg [OPTS] [--hidden] [--no-ignore] PATTERN [path]...{{/rg}}",
  "If an LSP session is running, `sh` tool editing commands will trigger LSP auto-lint.",
]
sh_signal = [
  "sh_signal defaults to SIGINT, and signal is always delivered to the whole process group.",
  "Do not run `kill` via sh on background PIDs; use `sh_signal` instead.",
  "SIGKILL terminates the process group and suppresses the completion notice; no completion notification will fire for that shell, so do not call wait_any expecting one; any other signal (SIGINT, SIGTERM, …) may be caught or ignored, so the process is not guaranteed to stop. Its completion notification will still fire when the process eventually exits; call wait_any to yield until then."
]
sh_background_ps = [
  "Use sh_background_ps to list running background shells and monitors.",
]
