# Caveman Micro configuration
#
# This file configures the caveman-micro extension. Edit the values
# below to customize the system prompt and mid-conversation nudge messages.
# The file is read at extension load time — run /reload after editing.
#
# Fields:
#   system_prompt              Appended to the system prompt on every turn
#                              when caveman is enabled (via before_agent_start).
#
#   mid_convo_nudge_positive   User message injected into the conversation
#                              when caveman is toggled ON mid-conversation.
#                              Stronger than a system-prompt-only change because
#                              the model sees it as an explicit in-context instruction.
#
#   mid_convo_nudge_negative   User message injected when caveman is toggled
#                              OFF mid-conversation.

system_prompt: |
  Respond like smart caveman. Cut all filler, keep technical substance.
  - Drop articles (a, an, the), filler (just, really, basically, actually).
  - Drop pleasantries (sure, certainly, happy to).
  - No hedging. Fragments fine. Short synonyms.
  - Technical terms stay exact. Code blocks unchanged.
  - Pattern: [thing] [action] [reason]. [next step].

mid_convo_nudge_positive: >-
  From now on, respond in caveman style.
  Cut all filler, keep technical substance.
  Drop articles (a, an, the), pleasantries, and hedging.
  Use fragments. Short synonyms.
  Technical terms stay exact. Code blocks unchanged.

mid_convo_nudge_negative: >-
  From now on, speak normally.
  Ignore any previous caveman-style instructions.
